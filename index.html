  <!-- Musiqa -->
  <!-- Kirish overlay -->
  <div class="intro-overlay" id="intro-overlay" onclick="startSite()">
    <div class="intro-box">
      <div class="intro-avatar">
        <img src="icons/avatar.jpg" alt="" onerror="this.style.display='none'" />
      </div>
      <h2 class="intro-name">AHRORJON<br>USMONTOYEV</h2>
      <p class="intro-hint">Press to enter</p>
    </div>
  </div>

  <audio id="bg-music" loop>
    <source src="icons/music.mp3" type="audio/mpeg" />
  </audio>

  <button class="music-btn" id="music-btn" onclick="toggleMusic()">
    <svg id="icon-on" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"
      width="18" height="18">
      <path d="M9 18V5l12-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="18" cy="16" r="3" />
    </svg>
    <svg id="icon-off" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"
      width="18" height="18" style="display:none">
      <path d="M9 18V5l12-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="18" cy="16" r="3" />
      <line x1="2" y1="2" x2="22" y2="22" />
    </svg>
  </button>

  <script>
    const music = document.getElementById('bg-music');
    const iconOn = document.getElementById('icon-on');
    const iconOff = document.getElementById('icon-off');

    function updateBtn() {
      if (music.paused) {
        iconOn.style.display = 'none';
        iconOff.style.display = 'block';
      } else {
        iconOn.style.display = 'block';
        iconOff.style.display = 'none';
      }
    }

    function toggleMusic() {
      if (music.paused) {
        music.play().catch(() => { });
      } else {
        music.pause();
      }
      updateBtn();
    }

    function startSite() {
      const overlay = document.getElementById('intro-overlay');
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      setTimeout(() => overlay.style.display = 'none', 600);
      music.play().then(() => { updateBtn(); }).catch(() => { });
    }
  </script>
